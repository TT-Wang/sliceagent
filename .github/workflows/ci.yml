name: CI

on:
  push:
    branches: ['**']   # every branch (pre-1.0): CI runs on each push, not just main
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12"]
        include:
          - os: windows-latest   # native Windows (Hermes pattern): imports, lint, and suite must hold
            python: "3.12"
    defaults:
      run:
        shell: bash              # Git Bash on the Windows runner — same shell the agent itself uses
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install ripgrep (powers grep / glob / the code-index tier)
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ripgrep
          elif [ "$RUNNER_OS" = "Windows" ]; then
            choco install ripgrep -y
          else
            brew install ripgrep
          fi

      - name: Install sliceagent + dev/tui extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui]"

      - name: Smoke — the installed console script runs
        run: sliceagent version

      - name: Lint (ruff)
        run: ruff check src/sliceagent tests

      - name: Tests
        run: bash scripts/run_tests.sh

      # Users install via `uv tool install` (install.sh / install.ps1) — a DIFFERENT code path from
      # the pip install above (uv writes .exe trampoline shims on Windows; antivirus/permission
      # surface). Validate it from the built wheel on the Windows cell.
      - name: Windows — validate the uv tool-install path
        if: runner.os == 'Windows'
        run: |
          pip install uv build
          python -m build --wheel
          uv tool install --python 3.12 --from "$(ls dist/*.whl)" sliceagent
          "$USERPROFILE/.local/bin/sliceagent.exe" version
