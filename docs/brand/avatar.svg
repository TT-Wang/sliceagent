<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="personal avatar">
  <title>personal avatar</title>
  <desc>A flat illustrated portrait in a friendly Notion style: short dark hair, glasses, a gentle smile, on a soft slate-blue background with an amber collar.</desc>

  <!-- background -->
  <rect x="0" y="0" width="1024" height="1024" fill="#B7C8E2"/>

  <!-- neck -->
  <path d="M462 596 q50 26 100 0 l0 150 q-50 24 -100 0 Z" fill="#ECBD96"/>
  <path d="M462 596 q50 26 100 0 l0 40 q-50 22 -100 0 Z" fill="#D9A47E"/>

  <!-- shoulders / shirt -->
  <path d="M104 1024 L104 866 C104 762 252 716 512 716 C772 716 920 762 920 866 L920 1024 Z" fill="#20304C"/>
  <!-- amber collar -->
  <path d="M430 730 Q512 802 594 730" stroke="#F5A623" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- face -->
  <ellipse cx="512" cy="432" rx="178" ry="202" fill="#ECBD96"/>

  <!-- ears -->
  <ellipse cx="338" cy="456" rx="34" ry="46" fill="#ECBD96"/>
  <ellipse cx="686" cy="456" rx="34" ry="46" fill="#ECBD96"/>
  <path d="M330 444 q14 12 6 34" stroke="#D9A47E" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M694 444 q-14 12 -6 34" stroke="#D9A47E" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- hair -->
  <path d="M324 488 C324 300 412 198 512 198 C612 198 700 300 700 488 C652 452 606 366 544 352 C502 342 470 346 444 360 C400 384 372 436 324 488 Z" fill="#262A33"/>

  <!-- eyebrows -->
  <path d="M404 396 q48 -20 92 -4" stroke="#262A33" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M528 392 q44 -16 92 4" stroke="#262A33" stroke-width="13" stroke-linecap="round" fill="none"/>

  <!-- glasses -->
  <rect x="392" y="404" width="118" height="92" rx="30" fill="#FFFFFF" fill-opacity="0.06" stroke="#262A33" stroke-width="8"/>
  <rect x="514" y="404" width="118" height="92" rx="30" fill="#FFFFFF" fill-opacity="0.06" stroke="#262A33" stroke-width="8"/>
  <path d="M510 432 q4 -8 4 0" stroke="#262A33" stroke-width="8" stroke-linecap="round" fill="none"/>
  <line x1="392" y1="438" x2="346" y2="430" stroke="#262A33" stroke-width="8" stroke-linecap="round"/>
  <line x1="632" y1="438" x2="678" y2="430" stroke="#262A33" stroke-width="8" stroke-linecap="round"/>

  <!-- eyes -->
  <ellipse cx="451" cy="450" rx="18" ry="20" fill="#262A33"/>
  <ellipse cx="573" cy="450" rx="18" ry="20" fill="#262A33"/>
  <circle cx="457" cy="444" r="5" fill="#FFFFFF"/>
  <circle cx="579" cy="444" r="5" fill="#FFFFFF"/>

  <!-- nose -->
  <path d="M512 470 q-10 40 -22 56 q10 12 26 6" stroke="#D29A72" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- mouth -->
  <path d="M460 556 Q512 592 564 556" stroke="#9C5E4A" stroke-width="10" stroke-linecap="round" fill="none"/>
</svg>
