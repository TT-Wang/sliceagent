<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="memagent — memory-native coding agent">
  <title>memagent — memory-native coding agent</title>
  <desc>Hero banner. Headline reads memory-native coding agent; a stacked deck of turns whose top card is the active memory slice, listing the memory tiers with the current-error tier highlighted in amber.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1A33"/>
      <stop offset="1" stop-color="#070B14"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#152038"/>
      <stop offset="1" stop-color="#0A0F1A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F5A623" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#3A4A6A" opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="560" y="40" width="700" height="560" fill="url(#glow)"/>

  <!-- lockup -->
  <g transform="translate(80,46) scale(0.4375)">
    <rect x="10" y="10" width="108" height="108" rx="28" fill="url(#ink)" stroke="#2A3A5A" stroke-width="2"/>
    <rect x="24" y="55" width="80" height="18" rx="6" fill="#F5A623" opacity="0.14"/>
    <rect x="32" y="37" width="40" height="6" rx="3" fill="#3A4A6A"/>
    <rect x="32" y="49" width="30" height="6" rx="3" fill="#3A4A6A"/>
    <rect x="30" y="61" width="66" height="6" rx="3" fill="#F5A623"/>
    <rect x="30" y="61" width="66" height="2.4" rx="1.2" fill="#FFD089"/>
    <rect x="32" y="73" width="44" height="6" rx="3" fill="#3A4A6A"/>
    <rect x="32" y="85" width="28" height="6" rx="3" fill="#3A4A6A"/>
  </g>
  <text x="150" y="92" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="30" font-weight="600" letter-spacing="-0.8"><tspan fill="#F0B24A">mem</tspan><tspan fill="#EAF0F8">agent</tspan></text>

  <!-- headline -->
  <text x="80" y="252" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="78" font-weight="600" letter-spacing="-2" fill="#ECF1F8">Memory-native</text>
  <text x="80" y="338" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="78" font-weight="600" letter-spacing="-2" fill="#ECF1F8">coding agent</text>

  <!-- one-liner -->
  <text x="82" y="406" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="22" font-weight="400" letter-spacing="0.1" fill="#94A3BA">Rebuilds a small, deterministic memory slice each turn —</text>
  <text x="82" y="438" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="22" font-weight="400" letter-spacing="0.1" fill="#94A3BA">not accumulate-then-summarize the whole transcript.</text>

  <!-- tagline pill -->
  <rect x="80" y="486" width="430" height="42" rx="21" fill="#F5A623" fill-opacity="0.09" stroke="#F5A623" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="106" y="513" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="18" font-weight="500" letter-spacing="0.3" fill="#FFC766">remember less &#183; reconstruct precisely</text>

  <text x="82" y="586" font-family="'SF Mono','JetBrains Mono',ui-monospace,monospace" font-size="15" font-weight="400" letter-spacing="0.2" fill="#5E6E86">github.com/TT-Wang/memagent</text>

  <!-- deck of turns: ghost cards behind -->
  <rect x="724" y="92" width="416" height="408" rx="20" fill="#0D1424" stroke="#1B2740" stroke-width="1.5" opacity="0.7"/>
  <rect x="712" y="101" width="416" height="408" rx="20" fill="#101A2E" stroke="#22314F" stroke-width="1.5" opacity="0.9"/>

  <!-- top card = active memory slice -->
  <rect x="700" y="112" width="416" height="408" rx="20" fill="#121C30" stroke="#2A3A56" stroke-width="1.5"/>

  <circle cx="1064" cy="150" r="4.5" fill="#4FD1C5"/>
  <text x="1080" y="155" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="14" font-weight="400" fill="#7E90AB" text-anchor="start">live</text>
  <text x="728" y="156" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="22" font-weight="600" letter-spacing="-0.3" fill="#FFC766">active memory slice</text>
  <text x="728" y="180" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="14" font-weight="400" fill="#7E90AB">reconstructed from ground truth</text>
  <line x1="728" y1="198" x2="1088" y2="198" stroke="#243350" stroke-width="1"/>

  <!-- tier rows -->
  <g font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif">
    <rect x="728" y="212" width="360" height="46" rx="10" fill="#19233A" stroke="#27364F" stroke-width="1"/>
    <text x="748" y="240" font-size="18" font-weight="500" fill="#CAD5E5">task</text>
    <text x="1068" y="240" font-size="14" font-weight="400" fill="#7E90AB" text-anchor="end">the goal, stable</text>

    <rect x="728" y="266" width="360" height="46" rx="10" fill="#F5A623" fill-opacity="0.12" stroke="#F5A623" stroke-opacity="0.5" stroke-width="1"/>
    <text x="748" y="294" font-size="18" font-weight="500" fill="#FFC766">current error</text>
    <text x="1068" y="294" font-size="14" font-weight="400" fill="#E0A647" text-anchor="end">verbatim</text>

    <rect x="728" y="320" width="360" height="46" rx="10" fill="#19233A" stroke="#27364F" stroke-width="1"/>
    <text x="748" y="348" font-size="18" font-weight="500" fill="#CAD5E5">recent actions</text>
    <text x="1068" y="348" font-size="14" font-weight="400" fill="#7E90AB" text-anchor="end">last k steps</text>

    <rect x="728" y="374" width="360" height="46" rx="10" fill="#19233A" stroke="#27364F" stroke-width="1"/>
    <text x="748" y="402" font-size="18" font-weight="500" fill="#CAD5E5">working set</text>
    <text x="1068" y="402" font-size="14" font-weight="400" fill="#7E90AB" text-anchor="end">files, re-read fresh</text>

    <rect x="728" y="428" width="360" height="46" rx="10" fill="#19233A" stroke="#27364F" stroke-width="1"/>
    <text x="748" y="456" font-size="18" font-weight="500" fill="#CAD5E5">discovery</text>
    <text x="1068" y="456" font-size="14" font-weight="400" fill="#7E90AB" text-anchor="end">top-k relevant</text>
  </g>

  <text x="728" y="500" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="14" font-weight="400" fill="#8293AC"><tspan fill="#F5A623">&#8594; </tspan>one model call, then fold results back into tiers</text>
</svg>
