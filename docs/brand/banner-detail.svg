<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="memagent — memory-native coding agent">
  <title>memagent — memory-native coding agent</title>
  <desc>Detail-page banner. The memagent lockup and one-liner on the left; on the right, a chart contrasting a flat bounded memory slice against a transcript that grows and is summarized in a sawtooth.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1A33"/>
      <stop offset="1" stop-color="#070B14"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#152038"/>
      <stop offset="1" stop-color="#0A0F1A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F5A623" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#3A4A6A" opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#dots)"/>
  <rect x="640" y="0" width="560" height="340" fill="url(#glow)"/>

  <!-- lockup -->
  <g transform="translate(70,38) scale(0.40)">
    <rect x="10" y="10" width="108" height="108" rx="28" fill="url(#ink)" stroke="#2A3A5A" stroke-width="2"/>
    <rect x="24" y="55" width="80" height="18" rx="6" fill="#F5A623" opacity="0.14"/>
    <rect x="32" y="37" width="40" height="6" rx="3" fill="#3A4A6A"/>
    <rect x="32" y="49" width="30" height="6" rx="3" fill="#3A4A6A"/>
    <rect x="30" y="61" width="66" height="6" rx="3" fill="#F5A623"/>
    <rect x="30" y="61" width="66" height="2.4" rx="1.2" fill="#FFD089"/>
    <rect x="32" y="73" width="44" height="6" rx="3" fill="#3A4A6A"/>
    <rect x="32" y="85" width="28" height="6" rx="3" fill="#3A4A6A"/>
  </g>
  <text x="134" y="80" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="28" font-weight="600" letter-spacing="-0.8"><tspan fill="#F0B24A">mem</tspan><tspan fill="#EAF0F8">agent</tspan></text>

  <!-- headline -->
  <text x="70" y="172" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="44" font-weight="600" letter-spacing="-1.4" fill="#ECF1F8">Memory-native coding agent</text>

  <!-- one-liner -->
  <text x="72" y="212" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="19" font-weight="400" letter-spacing="0.1" fill="#94A3BA">Reconstructs a small, deterministic memory slice each turn —</text>
  <text x="72" y="240" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="19" font-weight="400" letter-spacing="0.1" fill="#94A3BA">instead of accumulating and summarizing a transcript.</text>

  <!-- tagline pill -->
  <rect x="72" y="276" width="400" height="40" rx="20" fill="#F5A623" fill-opacity="0.09" stroke="#F5A623" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="96" y="302" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="17" font-weight="500" letter-spacing="0.3" fill="#FFC766">remember less &#183; reconstruct precisely</text>

  <!-- chart panel: context per turn -->
  <rect x="770" y="64" width="360" height="212" rx="16" fill="#121C30" stroke="#2A3A56" stroke-width="1.5"/>
  <text x="790" y="96" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="15" font-weight="500" fill="#9AA9C0">context per turn</text>
  <line x1="792" y1="244" x2="1108" y2="244" stroke="#243350" stroke-width="1"/>

  <!-- transcript + compaction: growing sawtooth -->
  <polyline points="796,236 832,150 838,176 874,128 880,156 918,110 924,140 962,96 968,128 1006,84 1012,118 1050,74 1056,110 1104,68" fill="none" stroke="#7E8DA6" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- slice: flat, bounded -->
  <line x1="796" y1="222" x2="1104" y2="222" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
  <circle cx="832" cy="222" r="3" fill="#F5A623"/>
  <circle cx="918" cy="222" r="3" fill="#F5A623"/>
  <circle cx="1006" cy="222" r="3" fill="#F5A623"/>
  <circle cx="1104" cy="222" r="3" fill="#F5A623"/>

  <!-- legend -->
  <rect x="792" y="259" width="16" height="5" rx="2.5" fill="#F5A623"/>
  <text x="816" y="265" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="400" fill="#FFC766">slice &#183; bounded</text>
  <rect x="922" y="259" width="16" height="5" rx="2.5" fill="#7E8DA6"/>
  <text x="946" y="265" font-family="'Inter','SF Pro Display',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="400" fill="#8293AC">transcript + compaction</text>
</svg>
