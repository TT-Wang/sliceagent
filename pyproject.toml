[project]
name = "memagent"
version = "0.1.0"
description = "A memory-native coding agent: deterministic, bounded, reconstructed context (slice architecture)."
requires-python = ">=3.11"
dependencies = [
    "openai>=1.40",
    "httpx>=0.27",
]

[project.scripts]
memagent = "memagent.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/memagent"]
